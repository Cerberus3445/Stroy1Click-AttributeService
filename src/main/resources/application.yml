spring:
  application:
    name: Attribute-Service
  profiles:
    active: dev
  config:
    import: application-prod.yml
  cache:
    type: redis
    cache-names: redis-cache
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
  datasource:
    url: jdbc:postgresql://localhost:5435/stroy1click
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  flyway:
    url: jdbc:postgresql://localhost:5435/stroy1click
    user: postgres
    password: password
    baseline-on-migrate: true
  messages:
    basename: messages
    encoding: UTF-8
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 900MB
  threads:
    virtual:
      enabled: true

redisson:
  host: localhost
  port: 6379
  username: default
  password: password

server:
  port: 4040

otel:
  sdk:
    disabled: true

resilience4j:
  ratelimiter:
    instances:
      attributeLimiter:
        limit-for-period: 100
        limit-refresh-period: 1s
      attributeOptionLimiter:
        limit-for-period: 100
        limit-refresh-period: 1s
      productAttributeAssignmentLimiter:
        limit-for-period: 100
        limit-refresh-period: 1s